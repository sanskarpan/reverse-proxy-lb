# Config for the docker-compose demo. Backends are addressed by their compose
# service names; the admin/metrics endpoint binds to all interfaces so probes and
# scrapes are reachable from the host.
server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 30s

backends:
  - url: "http://backend1:8001"
    weight: 1
  - url: "http://backend2:8002"
    weight: 1
  - url: "http://backend3:8003"
    weight: 1

load_balancer:
  algorithm: "round_robin"
  health_check:
    enabled: true
    interval: 5s
    timeout: 2s
    path: "/health"
    healthy_threshold: 2
    unhealthy_threshold: 3

circuit_breaker:
  enabled: true
  failure_threshold: 5
  success_threshold: 2
  timeout: 30s

rate_limiter:
  enabled: true
  requests_per_second: 1000
  burst: 1000

retry:
  max_attempts: 2
  max_backoff: 2s

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  host: "0.0.0.0"
  port: 9090

compression:
  enabled: true
