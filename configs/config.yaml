server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

tls:
  enabled: false
  cert_file: ""
  key_file: ""

# TLS options for connecting to https:// backends.
backend_tls:
  insecure_skip_verify: false
  ca_file: ""

backends:
  - url: "http://localhost:8001"
    weight: 1
    max_conns: 100
  - url: "http://localhost:8002"
    weight: 2
    max_conns: 100
  - url: "http://localhost:8003"
    weight: 1
    max_conns: 100

load_balancer:
  algorithm: "round_robin"
  health_check:
    enabled: true
    interval: 10s
    timeout: 5s
    path: "/health"

circuit_breaker:
  enabled: true
  failure_threshold: 5
  success_threshold: 2
  timeout: 30s

rate_limiter:
  enabled: true
  requests_per_second: 100
  burst: 200

retry:
  max_attempts: 3
  backoff: "exponential"
  max_backoff: 10s

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  port: 9090

compression:
  enabled: true
