apiVersion: v1
kind: Service
metadata:
  name: {{ include "rplb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rplb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "rplb.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: admin
      protocol: TCP
