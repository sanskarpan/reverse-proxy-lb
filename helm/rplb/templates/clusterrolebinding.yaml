{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rplb.fullname" . }}-discovery
  labels:
    {{- include "rplb.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rplb.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "rplb.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
