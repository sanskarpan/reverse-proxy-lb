apiVersion: v1
kind: ConfigMap
metadata:
  name: rplb-config
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8080
      shutdown_timeout: 30s
    backends:
      # Point at your upstream Service(s). Or use `discovery.dns` with a headless
      # Service to auto-discover pods via SRV records.
      - url: "http://app:80"
        weight: 1
    load_balancer:
      algorithm: "round_robin"
      health_check:
        enabled: true
        interval: 5s
        timeout: 2s
        path: "/health"
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      success_threshold: 2
      timeout: 30s
    rate_limiter:
      enabled: true
      requests_per_second: 2000
      burst: 2000
    logging:
      level: "info"
      format: "json"
    metrics:
      enabled: true
      host: "0.0.0.0"   # so k8s probes / Prometheus can reach the admin plane
      port: 9090
    compression:
      enabled: true
